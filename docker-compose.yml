version: '3.8'

services:
  web:
    build: .
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      - ai-service

  ai-service:
    build: ./ai-service
    ports:
      - '8000:8000'
    environment:
      - API_KEY=${AI_SERVICE_API_KEY}
      - MAX_FILE_SIZE=10485760
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          memory: 4G
